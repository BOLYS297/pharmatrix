<!DOCTYPE html>

  <head>

  <body>
    <div class="papa1">

        <div class="papa6">
          
          
        </div>
        <div class="papa10">
          <i class="fas fa-envelope papa9"></i>
          <input type="email" name="email" placeholder="ADDRESS EMAIL" maxlength="50" minlength="10" id="email" class="papa8"required />
        </div>
        <div class="papa6">
          
          
        </div>

          <i class="fas fa-lock papa9"></i>

        </div>
        <button class="papa11" type="submit">Se connecter</button>
      </form>
        <p class="papa12">
          Vous avez nouveau ?<a href="#"><u>s'inscrire</u></a>
        </p>
        <p class="indication">
          retrouvez nous sur
        </p>
        <div class="papa13">
          <i class="fab fa-google"></i>
          <i class="fab fa-facebook"></i>

        </div>
